on:
  - push
  - pull_request
jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-24.04]
        build_type: [Debug, Release]
        nix_shell: [default, llvm]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: nix develop .#${{ matrix.nix_shell }} --command bash -e {0}
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v27
      - name: Configure
        run: cmake -G Ninja -B build -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} -DBJAC_BUILD_TESTS=ON
      - name: Build
        run: cmake --build build -j4
      - name: Unit tests
        run: ctest --test-dir build --output-on-failure
